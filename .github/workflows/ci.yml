name: CI

# This workflow check if the trigger is from a regular push to main branch or from a release tag push. if is a regular push he will push to ECR with the tag of "name+HASH" and if is a release tag push he will push to ECR with the two tags - "name+HASH" and "name+VERSION". And then he will run smoke test on the built images of the backend and the frontend to make sure that they are working correctly.

on: # The trigger for this workflow. 
  pull_request: # To verify that the new code in the PR doesn't break the code in main. The workflow will run after a PR to main.
    branches: [ "main" ]

  push: # After a PR is merged to main, this is why its called push.
    branches: [ "main" ]
    tags: # Here we define that if the push is a tag push (git push origin v1.0.0), then the workflow will run. You need seperate trigger for tags because you have specifice logic in the workflow to handle release tags that will not applied to regular pushes - shuch as conditions like: "(IS_RELEASE=true)".
      - "v*.*.*" # If the tag will start with "v" and with this format then the workflow will run.

jobs:
  build-images: # the job name - build-images.
    runs-on: ubuntu-latest
    permissions:
      contents: read # Allows to GITHUB_TOKEN to read the repository contents, which is necessary for actions/checkout to work.
      id-token: write # Here we allow the GITHUB_TOKEN to create an OIDC token, which is necessary for the GitHub Actions to authenticate with AWS and push the images to ECR without needing to store AWS credentials in GitHub Secrets. 

    steps:
      - name: Checkout
        uses: actions/checkout@v4 # This action checks out the repository code so that the workflow can access it, and build the images to run the tests.

      

      - name: Compute tags (SHA / Version) # This step is for check if the push is a regular push or a release tag push.
        shell: bash
        run: |
          set -euo pipefail                                     # This makes the script to fail if any command fails, if there is an undefined variable, or if any command in a pipeline fails. 

          SHORT_SHA="${GITHUB_SHA::7}"                          # GITHUB_SHA - return the full commit HASH, and the syntax of "::7" return only the first 7 chars, which is enough to uniquely identify the commit.
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_ENV"          # GITHUB_ENV is a special file of GitHub Actions that allows to set environment variables that will be available in the next steps of the workflow. Here we set the SHORT_SHA variable to be used in the next steps.
 
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then        # GITHUB_REF - Holds the full reference of the branch or tag that triggered the workflow. for example, if the push is from main branch the the value will be "refs/heads/main", and if the push is from feacher branch the value will be "refs/heads/feature-branch", and if the push is from a tag the value will be "refs/tags/v1.0.0". Here we check if the GITHUB_REF starts with "refs/tags/v", which means that the push is from a release tag.
            VERSION="${GITHUB_REF_NAME#v}"                      # GITHUB_REF_NAME - Here is holds the short name of the tag such as "v1.0.0", and the syntax of "#v" means to remove the leading "v" from the tag name, so we get only "1.0.0" as the version number.
            echo "IS_RELEASE=true" >> "$GITHUB_ENV"             # We set the IS_RELEASE variable to true, for the next steps.
            echo "VERSION=$VERSION" >> "$GITHUB_ENV"            # We set the VERSION as the version number that we extracted from the tag name, for the next steps.
          else
            echo "IS_RELEASE=false" >> "$GITHUB_ENV"
          fi

      - name: Show computed tags # This step is for debugging purposes, to show the computed variables that we set in the previous steps. So if there is an issue with the workflow we can easily identify it by looking at the logs of this step.
        shell: bash
        run: |
          echo "GITHUB_REF=${GITHUB_REF}"
          echo "GITHUB_REF_NAME=${GITHUB_REF_NAME}"
          echo "IS_RELEASE=${IS_RELEASE}"
          echo "SHORT_SHA=${SHORT_SHA}"
          if [[ "${IS_RELEASE}" == "true" ]]; then
            echo "VERSION=${VERSION}"
          fi

      

      - name: Build backend image
        shell: bash
        run: |
          set -euo pipefail

          # Result name of the build = calculator-backend:sha-abcdefg .
          docker build \
            -t calculator-backend:sha-${SHORT_SHA} \
            ./backend

          if [[ "${IS_RELEASE}" == "true" ]]; then
            docker tag calculator-backend:sha-${SHORT_SHA} calculator-backend:${VERSION}             # If this is a release tag push, we also tag the image (calculator-backend:sha-abcdefg) with the version number, so we can easily identify it later. Result = calculator-backend:1.0.0 . The format of docker tag is: "docker tag SOURCE_IMAGE[:TAG] TARGET_IMAGE[:TAG]".
          fi

      - name: Build frontend image
        shell: bash
        run: |
          set -euo pipefail

          docker build \
            -t calculator-frontend:sha-${SHORT_SHA} \
            ./frontend

          if [[ "${IS_RELEASE}" == "true" ]]; then
            docker tag calculator-frontend:sha-${SHORT_SHA} calculator-frontend:${VERSION}
          fi

      - name: Smoke test backend container
        shell: bash
        run: |
          set -euo pipefail

          docker run --rm -d --name backend-ci -p 5000:5000 calculator-backend:sha-${SHORT_SHA}

          for i in $(seq 1 30); do
            if curl -fsS http://localhost:5000/health > /dev/null; then  # curl -fsS: make the curl command silent and fail on HTTP errors.
              echo "Backend is healthy"
              docker rm -f backend-ci >/dev/null 2>&1 || true      # -f: force stop and remove the container, right after the test.
              exit 0                                               # exit from the script with success status. 
            fi
            echo "Waiting for backend..."
            sleep 2
          done

          echo "Backend did not become healthy"
          docker logs backend-ci || true               # print the logs of the container to the stdout of GitHub Actions Runner.
          docker rm -f backend-ci >/dev/null 2>&1 || true
          exit 1

      - name: Smoke test frontend container
        shell: bash
        run: |
          set -euo pipefail
          # In this build we use the -v flag to mount the nginx.ci.conf file from the files tree to the container, to replace the default nginx.conf file that is in the image. This is because the default nginx.conf file is configured to forward the API requests to the backend server, but in the CI environment we don't have a backend server, so we need to use a different nginx.conf file that only serves the static files without forwarding any requests to the backend server. This allows us to test the frontend application independently of the backend server even when the backend is not exist like in the CI environment.
          docker run --rm -d --name frontend-ci -p 8080:80 \
          -v "$GITHUB_WORKSPACE/frontend/nginx.ci.conf:/etc/nginx/conf.d/default.conf:ro" \
          calculator-frontend:sha-${SHORT_SHA}

          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/ > /dev/null; then
              echo "Frontend is serving"
              docker rm -f frontend-ci >/dev/null 2>&1 || true
              exit 0
            fi
            echo "Waiting for frontend..."
            sleep 2
          done

          echo "Frontend did not become healthy"
          docker logs frontend-ci || true
          docker rm -f frontend-ci >/dev/null 2>&1 || true
          exit 1
      
      - name: Configure AWS credentials (OIDC) 
        if: github.event_name == 'push'                        # We add a condition here and define that the "OIDC doken" proccess will apply only if the PR was successfully compleate and the commit pushed to origin/main, Because if only the PR was opened and we will push images to ECR it will be mistake if after that the image didnt successfully built in smoke-test. There for only after successful push to main the process will start.
        uses: aws-actions/configure-aws-credentials@v4         # Here we do five steps: 1) Ask form GitHub ODIC token. 2) Send the token to AWS STS service. 3) make "AssumeRoleWithWebIdentity" API call to assume the specified role. 4) Get temporary AWS credentials from the response of the API call. 5) Configure those values as environment variables in the runner of GitHub Action.
        with:
          role-to-assume: arn:aws:iam::757630643687:role/calculator-github-actions-dev    # Here we specify the IAM role that we want to assume, by his ARN.
          aws-region: us-east-1

      - name: Verify AWS identity   # To check the connection.
        if: github.event_name == 'push'
        run: aws sts get-caller-identity
  
      - name: Set ECR repository URLs (Dev)   # Save in GITHUB_ENV the variables of the backend/frontend URLs.
        if: github.event_name == 'push'
        run: |
          echo "ECR_BACKEND=757630643687.dkr.ecr.us-east-1.amazonaws.com/calculator-dev-backend" >> "$GITHUB_ENV"
          echo "ECR_FRONTEND=757630643687.dkr.ecr.us-east-1.amazonaws.com/calculator-dev-frontend" >> "$GITHUB_ENV"

       
      - name: Login to Amazon ECR
        if: github.event_name == 'push'
        run: |
          aws ecr get-login-password --region us-east-1 \
          | docker login --username AWS --password-stdin 757630643687.dkr.ecr.us-east-1.amazonaws.com

      - name: Push images to ECR (Dev)    # Here we push to ECR the images. We also do this: "docker tag ... to ..." this is for aliac the name of the images from the oldest names to the name of the ECR registry + SHA. we do it because that by default "docker push" will push to Docker hub there for we define in the name itself the destination (domain of the registry) and docker will try to connect to this repo and he will check permissions and only after that he will push to our ECR. 
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail

          # Push SHA tags
          docker tag calculator-backend:sha-${SHORT_SHA}  ${ECR_BACKEND}:sha-${SHORT_SHA}
          docker tag calculator-frontend:sha-${SHORT_SHA} ${ECR_FRONTEND}:sha-${SHORT_SHA}

          docker push ${ECR_BACKEND}:sha-${SHORT_SHA}
          docker push ${ECR_FRONTEND}:sha-${SHORT_SHA}

          # Push release tags (version) if this is a release tag push
          if [[ "${IS_RELEASE}" == "true" ]]; then
            docker tag calculator-backend:sha-${SHORT_SHA}  ${ECR_BACKEND}:${VERSION}
            docker tag calculator-frontend:sha-${SHORT_SHA} ${ECR_FRONTEND}:${VERSION}

            docker push ${ECR_BACKEND}:${VERSION}
            docker push ${ECR_FRONTEND}:${VERSION}
          fi

  propose-desire-state-update:                # New job.
    name: Propose desire state image update
    runs-on: ubuntu-latest 
    needs: build-images  # This means that this job will run only after the successful completion of the "build-images" job.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # This job will run only if the event that triggered the workflow is a push to the main branch, because we want to propose the desire state update only after a successful push to main, and not for pull requests or tag pushes. This is because the desire state update is relevant only after the code is merged to main and the images are pushed to ECR.
    environment: prod-promotion  # This environment we created in GitHub UI for this repository. And here we force the CI job to use this environment. In this invironment we defined that only after a manual approval of "HaimNemir" the job will start to run, and we do it because its the safest way to deployment to production, and here we try to make dev like prod. Also in this environment we get APP_PRIVATE_KEY secret and APP_ID variable that we need for the next steps of the workflow for the authentication with GitHub App.
    permissions:
      contents: read # Gives read access to current repository contents, and in the step of "Generate GitHub App token" we will get a token with permissions to access the "calculator_desire_state" repository,

    steps:
      - name: Compute target tag
        shell: bash
        run: |
          set -euo pipefail       # This makes the script to fail if any command fails, if there is an undefined variable, or if any command in a pipeline fails. 
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"           # ${variable:start:length} - This is a substring syntax in bash that allows to extract a portion of a string. Here we extract the first 7 chars of the GITHUB_SHA variable, which is hold the last commit HASH that triggered the workflow. And we save it in the "GITHUB_ENV" global variable file for CI environment when the "step" is executed.
          echo "NEW_IMAGE_TAG=sha-${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "UPDATE_BRANCH=automation/promote-sha-${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Generate GitHub App token
        id: app-token # Here we give a variable name for this step for the scope of this workflow, and so we can get the output of this step in the next steps, and for our case we need to get the "token" output that this step will generate. And in the next steps we can get this token by using the syntax: "${{steps.app-token.outputs.token}}".
        uses: actions/create-github-app-token@v2 # This is an official action of GitHub. Its job is to authenticate as a GitHub App that we created in GitHub UI, and ask from GitHub a short lived installation token to access the "calculator_desire_state" repository with read and write permissions. 
        with:
          app-id: ${{ vars.APP_ID }} # Here we tell the action which GitHub App we want to use. 
          private-key: ${{ secrets.APP_PRIVATE_KEY }} # This APP_PRIVATE_KEY is defined in the "environment" that we defined for this job. Its allows us to use the GitHub App.
          owner: ${{ github.repository_owner }} # Its important to understand that the GitHub App is created in some account (user or organization) and its only the blueprint of the app, and later you can install this app in different accounts, and each installation can generate tokens only for the account that the app is installed in. So its important to specify the owner of the app installation. And about the target repository that we specify below, we can narrow down the permmisions of the token to the specific repository. In default the owner is the current repository owner, but its good practice to specify it explicitly.
          repositories: |    # The only repository that this token will have access to. 
            calculator_desire_state    
          permission-contents: write
          permission-pull-requests: write
      # Output of this step: token. You can access it: ${{steps.app-token.outputs.token}}".

      - name: Checkout desire state repository
        uses: actions/checkout@v4 # This action can clone repository to the runner of GitHub Actions, so we can make changes to the desire state files and push them to the repository. 
        with:
          repository: ${{ github.repository_owner }}/calculator_desire_state # Here we specify which repository we want to clone and the owner of this repository (The same owner of the current repository).
          ref: main     # Specify the branch that we want to clone, and "main" here is the most updated branch so we choose it.
          token: ${{ steps.app-token.outputs.token }} # Here we use the token that we got from the "Generate GitHub App token" step.
          path: calculator_desire_state # Here we specify a new directory in the runner that the action will clone the repo to it.

      - name: Update image tag file
        shell: bash
        run: |
          set -euo pipefail

          cd calculator_desire_state

          python - <<'PY'
          import os
          from pathlib import Path

          path = Path("environments/values-dev-images.yaml")                      # Here we save an environment value that holds the path to the YAML file. "Path" is a class in python that allows us to work with file paths.
          new_tag = os.environ["NEW_IMAGE_TAG"]                                   # "os" is a module in python that allows you to work with the operating system, here it will be the runner of the CI. And here we use it to get the value of the "NEW_IMAGE_TAG" environment variable that we set in the previous steps.
          lines = path.read_text().splitlines()                                   # read_text() - return a string of the content of the file. splitlines() - split the string into a list of lines.
          updated = {"backend": False, "frontend": False}                         # updated - checklist to make sure that we updated both images tags.
          current_service = None
          inside_image_block = False                                              # inside_image_block - flag to indicate if we are inside the "image" block of the YAML file.

          for index, line in enumerate(lines):                                    # enumerate() - Get a list of strings/vars and for each string return the index and the string itself, the index will be set inside "index", and the string will be set inside "line".
              if line in ("backend:", "frontend:"):                               # The file structure in "desire_state" contains also lines with only one word such as: "backend:" and "frontend:", so when we check if "backend:" exist in the tuple of ("backend:", "frontend:") its make sense. 
                  current_service = line[:-1]                                     # Save the service name such as "backend" or "frontend". line[start:end:step] - here we define only the start(defalut 0) and the end (-1 : one letter from the end), and in result we get from "backend:" only "backend".
                  inside_image_block = False
                  continue

              if current_service and line == "  image:":
                  inside_image_block = True
                  continue

              if current_service and inside_image_block and line.startswith("    tag: "):
                  lines[index] = f"    tag: {new_tag}"
                  updated[current_service] = True
                  current_service = None
                  inside_image_block = False

          missing = []

          for service, was_updated in updated.items():
            if not was_updated:
              missing.append(service)

          if missing:
              raise SystemExit(f"Could not update tag for: {', '.join(missing)}")

          path.write_text("\n".join(lines) + "\n")            # path.write_text(...) - Here we write the updated cotent from inside the brackets back to the file.  "\n".join(lines) -  the "join" function takes a list of strings and connects them to an one string. And what that comes befor the "." is define what will be the seperate value between each string.   + "\n" - We add a new empty line at the end of the file for some tools that require it and its prevent problems. 
          PY

      - name: Detect repository changes
        id: detect-changes # give a ID name to this step so we can refer his outputs later.
        shell: bash
        run: |
          set -euo pipefail

          cd calculator_desire_state

          if git diff --quiet; then     # if there is no changes in the repo from the last commit, it will return true.
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push update branch
        if: steps.detect-changes.outputs.has_changes == 'true'
        shell: bash
        run: |
          set -euo pipefail

          cd calculator_desire_state

          # Those next two lines is to define the git user and email, because when we try to commit the changes that we made to the "values-dev-images.yaml" file, git will check if there is a user name and email defined in the git config, and if there is not it will fail. 
          git config user.name "github-actions[bot]"    # This config change the user/email only for the scope of this branch in this fork repo.
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Best practice in Git is first create a new branch for your changes, but here its not a problem because the new branch will be empty and the "git checkout" will not block the process and the changes will be commited to the new branch.
          git checkout -B "${UPDATE_BRANCH}"        # UPDATE_BRANCH - we set it above. git checkout -B "${UPDATE_BRANCH}" - Its equal to: git switch -C "${UPDATE_BRANCH}", and the meaning of it is to create a new branch with the name that we defined in the UPDATE_BRANCH variable, and if there is already branch with this name it will switch to it and make him to stop point to his current commit, and start point to the equal commit as the main branch, and in this way we make sure that the update branch always start from the most updated main branch.
          git add environments/values-dev-images.yaml
          git commit -m "CI commit: Promote calculator images to ${NEW_IMAGE_TAG}"
          git push --force-with-lease origin "${UPDATE_BRANCH}"       # Here we use "--force-with-lease" only for cases we change the CI and we use the same branch name in multiple update tags, but basiclly its redundant. To understand --force-with-lease you need to understand: There is a three copies branches for each branch: 1- the remote branch, 2- the local branch with the new changes, 3- The last copy of the remote branch that exists localy (but its possible to be outdated). --force-with-lease : This flag is make a force push even it override the state in the remote branch, with the local branch but only if the last local copy of the remote branch is the same as the current remote branch.

      - name: Create or reuse promotion PR in desire state repository 
        # pay attention: In this step we use the "gh" CLI tool for GitHub, and this tool allows us to interact with GitHub from the command line, such as creating PRs, listing PRs, etc. And this tool is different from the "git" CLI tool that allows us to make "commits" and "push" to the remote repository.

        if: steps.detect-changes.outputs.has_changes == 'true'
        shell: bash
        env:  # In this secion you can define environment variables that will be available only in this step.
          GH_TOKEN: ${{ steps.app-token.outputs.token }}  # Here we set for the "gh" CLI tool the authentication token. This variable is a "Hard coded" variable and "gh" is automatically recognize it and use it for authentication in all the commands that we will run with "gh" in this step.
        run: |
          set -euo pipefail

          repo="${GITHUB_REPOSITORY_OWNER}/calculator_desire_state"           # GITHUB_REPOSITORY_OWNER - is the owner of the current repository.
          existing_pr="$(gh pr list --repo "${repo}" --head "${UPDATE_BRANCH}" --base main --state open --json number --jq '.[0].number')"      # Its return the numeric number of the current PR that open already, or an empty list if there is no open PR.      "gh pr list" - Return a list of PRs, --repo - specify the repository, --head - specify the source branch of the PR (who is pushing the changes), --base - the target branch of the PR (who is receiving the changes), --state - the state of the PR (open, closed, all), --json - specify that we want to get the output in JSON format, and we want only the "number" field from the all fields of the PR, and this field is the number of the PR, and the result will look like this: [{"number": 17}] only if there is an existing PR, or this "[]" if there is not. "jq" is a command-line JSON processor and we use it to extract the desired value from existing JSON, so here we use "jq" to get only the number value from the JSON output list by using : '.[0].number' - the ".[0]" means to get the first element of the list (we only have one), and  ".number" means to get the the value "number" from the first element of the list. So in result we have the number of the PR or an empty list.

          if [[ -n "${existing_pr}" ]]; then         # "-n" - check if the string is not empty.
            echo "Promotion PR already exists: #${existing_pr}"
            exit 0    # Here we exit with success status from this step because there is no need to create a new PR if there is already an open PR for the same update branch.
          fi

          gh pr create \
            --repo "${repo}" \
            --base main \
            --head "${UPDATE_BRANCH}" \
            --title "Promote calculator images to ${NEW_IMAGE_TAG}" \
            # --body below is an additional description for the PR.
            --body "## Summary

          - update backend image tag to \`${NEW_IMAGE_TAG}\`
          - update frontend image tag to \`${NEW_IMAGE_TAG}\`
          - source commit: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
